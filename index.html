<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST_CHAT v25.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght=400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #000000;
            --panel-glass: rgba(255, 255, 255, 0.03);
            --border-white: rgba(255, 255, 255, 0.8);
            --border-white-dim: rgba(255, 255, 255, 0.15);
            --text-pure: #ffffff;
            --font-main: 'Cairo', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-black);
            color: var(--text-pure);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
        }

        .lock-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-black);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; padding: 20px; box-sizing: border-box;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .lock-card {
            width: 100%; max-width: 400px;
            background: var(--panel-glass);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-white); border-radius: 24px;
            padding: 40px 30px; text-align: center;
        }

        .lock-input {
            width: 100%; padding: 15px; background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border-white-dim); border-radius: 14px;
            color: #fff; font-size: 2rem; text-align: center;
            font-family: var(--font-mono); letter-spacing: 5px;
            box-sizing: border-box; margin: 25px 0; outline: none;
        }

        .lock-btn {
            width: 100%; padding: 15px; background: #ffffff; border: none;
            border-radius: 14px; color: #000000; font-weight: 700; font-size: 1.1rem;
            cursor: pointer;
        }

        .chat-container {
            width: 100%; max-width: 700px; height: 90vh;
            background: var(--panel-glass);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 24px; border: 1px solid var(--border-white);
            display: none; flex-direction: column; overflow: hidden;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5);
        }

        .chat-header {
            padding: 15px 25px; border-bottom: 1px solid var(--border-white-dim);
            display: flex; justify-content: space-between; align-items: center;
        }

        .security-timer {
            font-size: 0.85rem;
            font-family: var(--font-mono);
            background: rgba(255, 75, 75, 0.15);
            color: #ff4b4b;
            border: 1px solid rgba(255, 75, 75, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            display: none;
        }

        .chat-messages {
            flex: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 12px;
        }

        .message-bubble {
            max-width: 85%; padding: 12px 16px;
            border-radius: 16px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-white-dim);
            align-self: flex-start; cursor: pointer; transition: 0.2s;
        }

        .message-bubble.me {
            align-self: flex-end; background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255,255,255,0.4);
        }

        .msg-meta { font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-bottom: 4px; }
        .msg-text { font-family: var(--font-mono); font-size: 0.95rem; word-break: break-all; user-select: text; -webkit-user-select: text; }
        .msg-text.decrypted { font-family: var(--font-main); font-size: 1.1rem; color: #50ff75; font-weight: bold; }

        .chat-input-area {
            padding: 15px; border-top: 1px solid var(--border-white-dim);
            display: flex; gap: 10px; background: rgba(0,0,0,0.4);
        }

        .chat-input {
            flex: 1; padding: 14px; background: rgba(0,0,0,0.6);
            border: 1px solid var(--border-white-dim); border-radius: 12px;
            color: #fff; font-size: 1rem; outline: none;
        }

        .send-btn { padding: 0 25px; background: #fff; color: #000; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="lock-screen" id="lockScreen">
    <div class="lock-card">
        <h2>💀 GHOST_CHAT v25.0</h2>
        <p style="color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-bottom: 20px;">نظام المفتاح الديناميكي المتغير كل 10 دقائق 🔑</p>
        <input type="password" id="passInput" class="lock-input" placeholder="••••" maxlength="4" onkeydown="if(event.key==='Enter') checkPass()">
        <button class="lock-btn" onclick="checkPass()">تأكيد الهوية</button>
    </div>
</div>

<div class="chat-container" id="chatContainer">
    <div class="chat-header">
        <div style="display: flex; flex-direction: column;">
            <div style="font-weight:700; font-size:1.1rem;">💀 رادار الشبح المطور</div>
            <div style="font-size:0.75rem; color:rgba(255,255,255,0.5); margin-top:2px;">المفتاح يتغير تلقائياً ويرسل للديسكورد 🌐</div>
        </div>
        <div class="security-timer" id="topTimer">SEC: 30s</div>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="message-bubble" style="max-width: 100%;">
            <div class="msg-meta">نظام الرادار</div>
            <div class="msg-text" style="font-family: var(--font-main); color: #e69500;">
                💡 <b>نظام المفاتيح المتغيرة نشط:</b> رمز دخول الموقع يتغير تلقائياً كل 10 دقائق وينزل في روم الديسكورد حقك. شفر رسائلك هنا وأرسلها لخويك طبيعي.
            </div>
        </div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="msgInput" class="chat-input" placeholder="اكتب رسالة لتشفيرها.. أو الصق كود خويك هنا..." onkeydown="if(event.key==='Enter') processMessage()">
        <button class="send-btn" onclick="processMessage()">إرسال</button>
    </div>
</div>

<script>
const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1526355482166427678/pbkESbsazW8FMA2poZz_GbXhJxeUcgF2169axztnLfebZU88j5HU1URvpnN1LWncUYx-";

let localMessages = [];
let logoutTimer = null;
let countdownInterval = null;
let timeLeft = 30;
let isUserAuthenticated = false;
let lastSentBlock = -1; // لتفادي تكرار إرسال نفس الرمز للديسكورد

// 🔑 دالة توليد الرمز الرياضي المتغير كل 10 دقائق بناءً على تاريخ اليوم والساعة
function generateDynamicPass() {
    let now = new Date();
    let year = now.getFullYear();
    let month = now.getMonth() + 1;
    let day = now.getDate();
    let hour = now.getHours();
    let minute = now.getMinutes();
    
    // تقسيم الساعة إلى 6 بلوكات (كل بلوك 10 دقائق)
    let tenMinBlock = Math.floor(minute / 10);
    
    // معادلة توليد رقم شبه عشوائي ثابت خلال الـ 10 دقائق الحالية ومقترن باليوم
    let seed = (year * day) + (month * hour) + (tenMinBlock * 707);
    let generated = (Math.abs(Math.sin(seed)) * 10000);
    let finalPass = Math.floor(generated % 9000 + 1000).toString(); // رمز مكون من 4 أرقام دائماً
    
    // إذا تغير البلوك الزمني، نقوم بإرسال الكود الجديد فوراً للديسكورد
    if (tenMinBlock !== lastSentBlock) {
        lastSentBlock = tenMinBlock;
        sendKeyToDiscord(finalPass);
    }
    
    return finalPass;
}

// 🌐 دالة إرسال الرمز الجديد للديسكورد عبر الويب هوك (بدون منشن وبإمبيد فخم)
function sendKeyToDiscord(key) {
    const payload = {
        "embeds": [{
            "title": "🔑 تحديث مفتاح الدخول الديناميكي",
            "description": `تم توليد مفتاح دخول جديد للرادار بنجاح.\n\n**المفتاح الحالي الحين:**\n\`\`\`\n${key}\n\`\`\`\n*⏰ صالح لمدة 10 دقائق ويقفل تلقائياً.*`,
            "color": 3066993
        }]
    };
    fetch(DISCORD_WEBHOOK, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) }).catch(err => {});
}

// فحص الرمز بانتظام كل ثانيتين للتأكد من انتهاء صلاحية المفتاح القديم لو كان العضو داخل الشات
setInterval(() => {
    if (isUserAuthenticated) {
        let currentValidPass = generateDynamicPass();
        // لو المستخدم مسجل دخول ولكن انتهت الـ 10 دقائق وتبدل الرمز، يطرده برا حمايةً له
        let savedAuth = sessionStorage.getItem("currentKey");
        if (savedAuth && savedAuth !== currentValidPass) {
            forceLockSystem();
        }
    } else {
        generateDynamicPass(); // لتحديث الرمز حتى والشاشة مقفلة
    }
}, 2000);

function forceLockSystem() {
    isUserAuthenticated = false;
    sessionStorage.removeItem("isAuth");
    sessionStorage.removeItem("currentKey");
    clearInterval(countdownInterval);
    clearTimeout(logoutTimer);
    
    document.getElementById("chatContainer").style.display = "none";
    document.getElementById("topTimer").style.display = "none";
    
    let lockEl = document.getElementById("lockScreen");
    lockEl.style.display = "flex";
    lockEl.style.opacity = "1";
    document.getElementById("passInput").value = "";
}

function checkPass() {
    let input = document.getElementById("passInput").value.trim();
    let currentCorrectPass = generateDynamicPass(); // جلب الرمز الفعلي للـ 10 دقائق الحالية
    
    if (input === currentCorrectPass) {
        isUserAuthenticated = true;
        sessionStorage.setItem("isAuth", "true");
        sessionStorage.setItem("currentKey", currentCorrectPass); // حفظ الرمز الحالي المستعمل للدخول
        document.getElementById("lockScreen").style.opacity = "0";
        setTimeout(() => { 
            document.getElementById("lockScreen").style.display = "none"; 
            document.getElementById("chatContainer").style.display = "flex"; 
            document.getElementById("topTimer").style.display = "none";
        }, 300);
    } else { 
        document.getElementById("passInput").value = ""; 
    }
}

// ⏱️ [إدارة مؤقت الهروب الذكي 30 ثانية عند الخروج المؤقت لتيك توك]
document.addEventListener("visibilitychange", () => {
    if (!isUserAuthenticated) return;

    if (document.hidden) {
        timeLeft = 30;
        document.getElementById("topTimer").innerText = `SEC: ${timeLeft}s`;
        
        countdownInterval = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) { forceLockSystem(); }
        }, 1000);

        logoutTimer = setTimeout(() => { forceLockSystem(); }, 30000);
    } else {
        clearInterval(countdownInterval);
        clearTimeout(logoutTimer);
        timeLeft = 30; 
        
        let timerEl = document.getElementById("topTimer");
        timerEl.style.display = "block";
        timerEl.style.background = "rgba(80, 255, 117, 0.15)";
        timerEl.style.color = "#50ff75";
        timerEl.style.borderColor = "rgba(80, 255, 117, 0.3)";
        timerEl.innerText = "🔄 تم المزامنة!";
        
        setTimeout(() => { if (!document.hidden) timerEl.style.display = "none"; }, 1500);
    }
});

window.addEventListener("pagehide", () => { forceLockSystem(); });
window.onload = () => { forceLockSystem(); };

// --- محرك التشفير الكلاسيكي المستقر بالدقائق ---
const alphabet = ['أ','ا','ب','ت','ث','ج','ح','خ','د','ذ','ر','ز','س','ش','ص','ض','ط','ظ','ع','غ','ف','ق','ك','ل','م','ن','ه','هـ','و','ي','ى','ة','ء'];
function getMapForMinute(min) {
    let charToNum = {}; let numToChar = {}; let shifted = [...alphabet]; let shift = min % alphabet.length;
    for(let i=0; i<shift; i++) shifted.push(shifted.shift());
    shifted.forEach((char, index) => {
        let code = (index + 1).toString().padStart(2, '0');
        charToNum[char] = code; numToChar[code] = char;
    });
    charToNum['هـ'] = charToNum['ه']; charToNum['ى'] = charToNum['ي']; charToNum['أ'] = charToNum['ا']; charToNum[' '] = '00';
    return { charToNum, numToChar };
}

function runEncrypt(text) {
    let currentMin = new Date().getMinutes();
    let { charToNum } = getMapForMinute(currentMin);
    let fakeNum = ((currentMin % 5) + 4).toString();
    let result = "";
    for (let char of text) { if (charToNum[char]) result += charToNum[char] + fakeNum; }
    return result + currentMin.toString().padStart(2, '0');
}

function runDecrypt(cipher) {
    if(!cipher || cipher.length < 3) return null;
    let embeddedMin = parseInt(cipher.slice(-2));
    let mainCipher = cipher.slice(0, -2);
    if (isNaN(embeddedMin)) return null;
    
    for (let offset = 0; offset < 60; offset++) {
        let targetMin = (embeddedMin - offset + 60) % 60;
        let { numToChar } = getMapForMinute(targetMin);
        let fakeNum = ((targetMin % 5) + 4).toString();
        let decryptedText = ""; let success = true;
        
        for (let i = 0; i < mainCipher.length; i += 3) {
            let charCode = mainCipher.substring(i, i + 2);
            let extractedFake = mainCipher.substring(i + 2, i + 3);
            if (extractedFake !== fakeNum || !numToChar[charCode]) { success = false; break; }
            decryptedText += numToChar[charCode] === '00' ? ' ' : numToChar[charCode];
        }
        if (success) return decryptedText;
    }
    return null;
}

function processMessage() {
    let input = document.getElementById("msgInput");
    let text = input.value.trim();
    if(!text) return;

    let decryptedAttempt = runDecrypt(text);

    if (decryptedAttempt !== null) {
        localMessages.push({ isMe: false, cipherText: text, plainText: decryptedAttempt });
    } else {
        let encrypted = runEncrypt(text);
        localMessages.push({ isMe: true, cipherText: encrypted, plainText: text });
    }

    input.value = "";
    renderMessages();
}

function renderMessages() {
    let box = document.getElementById("chatMessages");
    let welcomeHtml = box.firstElementChild ? box.firstElementChild.outerHTML : "";
    box.innerHTML = welcomeHtml;
    
    localMessages.forEach((msg, idx) => {
        let bubble = document.createElement("div");
        bubble.className = `message-bubble ${msg.isMe ? 'me' : ''}`;
        bubble.onclick = () => toggleDecrypt(idx);
        bubble.innerHTML = `
            <div class="msg-meta">${msg.isMe ? 'أنت (اضغط للنسخ/الفك)' : 'خويك (اضغط للفك)'}</div>
            <div class="msg-text" id="msg-text-${idx}">${msg.cipherText}</div>
        `;
        box.appendChild(bubble);
    });
    box.scrollTop = box.scrollHeight;
}

function toggleDecrypt(idx) {
    let textEl = document.getElementById(`msg-text-${idx}`);
    let msgData = localMessages[idx];
    
    if(textEl.classList.contains("decrypted")) {
        textEl.innerText = msgData.cipherText;
        textEl.classList.remove("decrypted");
    } else {
        textEl.innerText = msgData.plainText;
        textEl.classList.add("decrypted");
        
        if (msgData.isMe) {
            navigator.clipboard.writeText(msgData.cipherText).then(() => {
                let metaEl = textEl.previousElementSibling;
                let oldText = metaEl.innerText;
                metaEl.innerText = "⚡ تم نسخ الكود المشفر وجاهز للإرسال!";
                metaEl.style.color = "#50ff75";
                setTimeout(() => { metaEl.innerText = oldText; metaEl.style.color = ""; }, 2000);
            });
        }
    }
}
</script>
</body>
</html>
