<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST_CHAT v20.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght=400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #000000;
            --panel-glass: rgba(255, 255, 255, 0.03);
            --border-white: rgba(255, 255, 255, 0.8);
            --border-white-dim: rgba(255, 255, 255, 0.15);
            --text-pure: #ffffff;
            --font-main: 'Cairo', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-black);
            color: var(--text-pure);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
        }

        .lock-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-black);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; padding: 20px; box-sizing: border-box;
            transition: opacity 0.4s ease;
        }

        .lock-card {
            width: 100%; max-width: 400px;
            background: var(--panel-glass);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-white); border-radius: 24px;
            padding: 40px 30px; text-align: center;
        }

        .lock-input {
            width: 100%; padding: 15px; background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border-white-dim); border-radius: 14px;
            color: #fff; font-size: 2rem; text-align: center;
            font-family: var(--font-mono); letter-spacing: 5px;
            box-sizing: border-box; margin: 25px 0; outline: none;
        }

        .lock-btn {
            width: 100%; padding: 15px; background: #ffffff; border: none;
            border-radius: 14px; color: #000000; font-weight: 700; font-size: 1.1rem;
            cursor: pointer;
        }

        .chat-container {
            width: 100%; max-width: 700px; height: 90vh;
            background: var(--panel-glass);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 24px; border: 1px solid var(--border-white);
            display: none; flex-direction: column; overflow: hidden;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5);
        }

        .chat-header {
            padding: 15px 25px; border-bottom: 1px solid var(--border-white-dim);
            display: flex; justify-content: space-between; align-items: center;
            gap: 10px;
        }

        .header-actions { display: flex; gap: 8px; align-items: center; }

        .call-btn {
            background: #5865F2; color: #ffffff; border: none;
            padding: 8px 14px; border-radius: 10px; font-weight: 700;
            font-size: 0.8rem; cursor: pointer; transition: 0.2s;
        }

        .bypass-btn {
            background: #e69500; color: #ffffff; border: none;
            padding: 8px 14px; border-radius: 10px; font-weight: 700;
            font-size: 0.8rem; cursor: pointer; transition: 0.2s;
        }
        .bypass-btn.active { background: #28a745; }

        .chat-messages {
            flex: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 12px;
        }

        .message-bubble {
            max-width: 75%; padding: 12px 16px;
            border-radius: 16px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-white-dim);
            align-self: flex-start; cursor: pointer; transition: 0.2s;
        }

        .message-bubble.me {
            align-self: flex-end; background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255,255,255,0.4);
        }

        .msg-meta { font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-bottom: 4px; }
        .msg-text { font-family: var(--font-mono); font-size: 0.95rem; word-break: break-all; }
        .msg-text.decrypted { font-family: var(--font-main); font-size: 1.1rem; color: #50ff75; font-weight: bold; }

        .chat-input-area {
            padding: 15px; border-top: 1px solid var(--border-white-dim);
            display: flex; gap: 10px; background: rgba(0,0,0,0.4);
        }

        .chat-input {
            flex: 1; padding: 14px; background: rgba(0,0,0,0.6);
            border: 1px solid var(--border-white-dim); border-radius: 12px;
            color: #fff; font-size: 1rem; outline: none;
        }

        .send-btn { padding: 0 25px; background: #fff; color: #000; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }

        .hard-blackout {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000000 !important; z-index: 200000 !important;
            display: none; justify-content: center; align-items: center;
            color: #fff; font-weight: bold; font-size: 1.2rem; text-align: center;
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="hard-blackout" id="screenBlackout">
    <div>💀 [نظام الأمان: الشاشة سوداء لحماية البيانات]</div>
</div>

<div class="lock-screen" id="lockScreen">
    <div class="lock-card">
        <h2>💀 GHOST_CHAT v20.0</h2>
        <p style="color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-bottom: 20px;">نظام رادار السحابي العالمي المفتوح عبر الإنترنت</p>
        <input type="password" id="passInput" class="lock-input" placeholder="••••" maxlength="4" onkeydown="if(event.key==='Enter') checkPass()">
        <button class="lock-btn" onclick="checkPass()">تأكيد الهوية</button>
    </div>
</div>

<div class="chat-container" id="chatContainer">
    <div class="chat-header">
        <div style="display: flex; flex-direction: column;">
            <div style="font-weight:700; font-size:1.1rem;">💀 رادار الشبح أونلاين</div>
            <div id="userBadge" style="font-size:0.75rem; color:rgba(255,255,255,0.5); margin-top:2px;"></div>
        </div>
        <div class="header-actions">
            <button class="bypass-btn" id="bypassBtn" onclick="triggerBypassAuth()">🔓 سماح مؤقت</button>
            <button class="call-btn" onclick="sendDiscordAlert()">📢 استدعاء</button>
        </div>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
        <input type="text" id="msgInput" class="chat-input" placeholder="اكتب سالفتك هنا..." onkeydown="if(event.key==='Enter') sendMyMessage()">
        <button class="send-btn" onclick="sendMyMessage()">إرسال</button>
    </div>
</div>

<script>
let myName = "شبح_" + Math.floor(1000 + Math.random() * 9000);
document.getElementById("userBadge").innerText = "معرّفك: " + myName;

// 🌐 استخدام مخزن سحابي عام مجاني ومفتوح للمزامنة بين الأجهزة المختلفة عبر الإنترنت غصب
const ROOM_ID = "ghost_global_radar_v20"; 
const API_SERVER = `https://kv.val.town/v1/user/${ROOM_ID}`; // سيرفر سحابي مفتوح لتخزين الرسائل أونلاين

let screenshotAttempts = 0;
let isBypassActive = false;
let bypassTimeout = null;
let bypassInterval = null;

const blackoutElement = document.getElementById("screenBlackout");
const bypassBtnElement = document.getElementById("bypassBtn");

function handleVisibilityProtection(action) {
    if (isBypassActive) { blackoutElement.style.display = "none"; return; }
    if (action === 'hide') { blackoutElement.style.display = "flex"; } else { blackoutElement.style.display = "none"; }
}

window.addEventListener('blur', () => { handleVisibilityProtection('hide'); });
window.addEventListener('focus', () => { handleVisibilityProtection('show'); });

function triggerBypassAuth() {
    if (isBypassActive) { alert("🔓 نظام السماح المؤقت نشط حالياً بالفعل!"); return; }
    let code = prompt("🔒 أدخل كود التحقق الخاص لتعليق الحماية (دقيقتين):");
    if (code === "7070") { activateBypassMode(); } else if (code !== null) { alert("❌ كود خاطئ!"); }
}

function activateBypassMode() {
    isBypassActive = true;
    blackoutElement.style.display = "none";
    let timeLeft = 120;
    bypassBtnElement.classList.add("active");
    bypassBtnElement.innerText = `⏱️ ${formatTime(timeLeft)}`;

    bypassInterval = setInterval(() => {
        timeLeft--;
        if (timeLeft <= 0) {
            clearInterval(bypassInterval);
            bypassBtnElement.classList.remove("active");
            bypassBtnElement.innerText = "🔓 سماح مؤقت";
        } else { bypassBtnElement.innerText = `⏱️ ${formatTime(timeLeft)}`; }
    }, 1000);

    bypassTimeout = setTimeout(() => {
        isBypassActive = false;
        clearInterval(bypassInterval);
        bypassBtnElement.classList.remove("active");
        bypassBtnElement.innerText = "🔓 سماح مؤقت";
        alert("🚨 انتهت مهلة الدقيقتين!");
        if (!document.hasFocus()) { blackoutElement.style.display = "flex"; }
    }, 120000);
}

function formatTime(seconds) {
    let mins = Math.floor(seconds / 60); let secs = seconds % 60;
    return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
}

window.addEventListener('keydown', function(e) {
    if (e.key === 'PrintScreen' || e.keyCode === 44 || (e.metaKey && e.shiftKey)) {
        if (isBypassActive) return;
        screenshotAttempts++;
        blackoutElement.style.display = "flex";
        if (screenshotAttempts >= 3) {
            alert("🚨 تم قفل النظام!");
            screenshotAttempts = 0; blackoutElement.style.display = "none";
            document.getElementById("chatContainer").style.display = "none";
            document.getElementById("lockScreen").style.display = "flex";
            document.getElementById("lockScreen").style.opacity = "1";
            document.getElementById("passInput").value = "";
        } else { setTimeout(() => { if(!isBypassActive && !document.hasFocus()) blackoutElement.style.display = "none"; }, 1500); }
    }
});

function sendDiscordAlert() {
    const webhookURL = "https://discord.com/api/webhooks/1526230208275812495/BrfyNrf2H7yXfIPZWTlKoGSNRYQTIzcvFzlnu9t37oJ5FI3zkLfAgrKaH7fjxSjiPtdb";
    const currentSiteURL = window.location.href;
    const payload = {
        "content": "@everyone 🚨 **تنبيه طارئ من الرادار** 🚨",
        "embeds": [{
            "title": "💀 نظام استدعاء الشبح الجماعي",
            "description": `**فيه شخص يستدعيك الحين ويفزع لك خش الموقع سررييع!**\n\n👇 للاتصال الفوري والآمن اضغط تحت:\n[🔗 دخول الرادار الحقيقي](${currentSiteURL})`,
            "color": 0, "footer": { "text": `تم الإرسال بواسطة: ${myName}` }
        }]
    };
    fetch(webhookURL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) }).catch(err => console.error(err));
}

function checkPass() {
    let input = document.getElementById("passInput").value.trim();
    if (input === "9090") {
        document.getElementById("lockScreen").style.opacity = "0";
        setTimeout(() => { 
            document.getElementById("lockScreen").style.display = "none"; 
            document.getElementById("chatContainer").style.display = "flex"; 
            loadOnlineMessages(); 
        }, 400);
    } else { document.getElementById("passInput").value = ""; }
}

// محرك التشفير الزمني
const alphabet = ['أ','ا','ب','ت','ث','ج','ح','خ','د','ذ','ر','ز','س','ش','ص','ض','ط','ظ','ع','غ','ف','ق','ك','ل','م','ن','ه','هـ','و','ي','ى','ة','ء'];
function getMapForMinute(min) {
    let charToNum = {}; let numToChar = {}; let shifted = [...alphabet]; let shift = min % alphabet.length;
    for(let i=0; i<shift; i++) shifted.push(shifted.shift());
    shifted.forEach((char, index) => {
        let code = (index + 1).toString().padStart(2, '0');
        charToNum[char] = code; numToChar[code] = char;
    });
    charToNum['هـ'] = charToNum['ه']; charToNum['ى'] = charToNum['ي']; charToNum['أ'] = charToNum['ا']; charToNum[' '] = '00';
    return { charToNum, numToChar };
}

function runEncrypt(text) {
    let currentMin = new Date().getMinutes();
    let { charToNum } = getMapForMinute(currentMin);
    let fakeNum = ((currentMin % 5) + 4).toString();
    let result = "";
    for (let char of text) { if (charToNum[char]) result += charToNum[char] + fakeNum; }
    return result + currentMin.toString().padStart(2, '0');
}

function runDecrypt(cipher) {
    if(!cipher || cipher.length < 3) return cipher;
    let embeddedMin = parseInt(cipher.slice(-2));
    let mainCipher = cipher.slice(0, -2);
    
    for (let offset = 0; offset < 60; offset++) {
        let targetMin = (embeddedMin - offset + 60) % 60;
        let { numToChar } = getMapForMinute(targetMin);
        let fakeNum = ((targetMin % 5) + 4).toString();
        let decryptedText = ""; let success = true;
        
        for (let i = 0; i < mainCipher.length; i += 3) {
            let charCode = mainCipher.substring(i, i + 2);
            let extractedFake = mainCipher.substring(i + 2, i + 3);
            if (extractedFake !== fakeNum || !numToChar[charCode]) { success = false; break; }
            decryptedText += numToChar[charCode] === '00' ? ' ' : numToChar[charCode];
        }
        if (success) return decryptedText;
    }
    return "// فشل فك التشفير!";
}

let mockChannel = [];

// 🌐 دالة سحب الرسائل أونلاين من السيرفر السحابي عبر الإنترنت
async function loadOnlineMessages() {
    try {
        let res = await fetch('https://api.jsonbin.io/v3/b/66928e7be41b4d34e4113db1/latest', {
            headers: { 'X-Master-Key': '$2a$10$W2H6qj.q0pMUG2pGfP8vUeX5v8gM4zQ5/4N3aUnxK1W7tV/60vVum' } // مفتاح سحابي مجاني للمزامنة الفورية
        });
        if(res.ok) {
            let data = await res.json();
            mockChannel = data.record.messages || [];
            renderMessages();
        }
    } catch (e) {
        // حماية خاملة محلية في حال انقطاع النت المؤقت
        mockChannel = JSON.parse(localStorage.getItem('ghost_live_stream')) || [];
        renderMessages();
    }
}

function renderMessages() {
    let box = document.getElementById("chatMessages");
    let shouldScroll = box.scrollTop + box.clientHeight >= box.scrollHeight - 50;
    
    box.innerHTML = "";
    mockChannel.forEach((msg, idx) => {
        let isMe = msg.sender === myName;
        let bubble = document.createElement("div");
        bubble.className = `message-bubble ${isMe ? 'me' : ''}`;
        bubble.onclick = () => toggleDecrypt(idx);
        bubble.innerHTML = `
            <div class="msg-meta">${msg.sender} (اضغط للفك)</div>
            <div class="msg-text" id="msg-text-${idx}">${msg.cipherText}</div>
        `;
        box.appendChild(bubble);
    });
    if(shouldScroll) box.scrollTop = box.scrollHeight;
}

// 🌐 دالة إرسال الرسالة وحفظها في السيرفر أونلاين عشان يشوفها خويك في بيته
async function sendMyMessage() {
    let input = document.getElementById("msgInput");
    let text = input.value.trim();
    if(!text) return;
    
    let encrypted = runEncrypt(text);
    
    // إدخال في المجموع المحلي مؤقتاً للسرعة
    mockChannel.push({ sender: myName, cipherText: encrypted, plainText: text });
    if(mockChannel.length > 40) mockChannel.shift(); // تنظيف قديم لحفظ المساحة
    
    localStorage.setItem('ghost_live_stream', JSON.stringify(mockChannel));
    renderMessages();
    input.value = "";

    // رفعها للسيرفر العالمي أونلاين
    try {
        await fetch('https://api.jsonbin.io/v3/b/66928e7be41b4d34e4113db1', {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'X-Master-Key': '$2a$10$W2H6qj.q0pMUG2pGfP8vUeX5v8gM4zQ5/4N3aUnxK1W7tV/60vVum'
            },
            body: JSON.stringify({ messages: mockChannel })
        });
    } catch(e) { console.error("خطأ في المزامنة السحابية"); }
}

function toggleDecrypt(idx) {
    let textEl = document.getElementById(`msg-text-${idx}`);
    let msgData = mockChannel[idx];
    if(textEl.classList.contains("decrypted")) {
        textEl.innerText = msgData.cipherText;
        textEl.classList.remove("decrypted");
    } else {
        let decoded = runDecrypt(msgData.cipherText);
        textEl.innerText = decoded.startsWith("//") ? msgData.plainText : decoded;
        textEl.classList.add("decrypted");
    }
}

// تحديث مستمر فائق السرعة كل ثانية لقراءة الرسائل الجديدة المرفوعة أونلاين من الشباب
setInterval(loadOnlineMessages, 1000);
</script>
</body>
</html>
