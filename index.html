<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST_CIPHER v11.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #040406;
            --panel-bg: #0b0c10;
            --neon-green: #39ff14;
            --font-main: 'Cairo', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-black);
            color: #e1e1e6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 620px;
            background: var(--panel-bg);
            border-radius: 24px;
            border: 1px solid #161922;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        h1 {
            font-weight: 700;
            color: var(--neon-green);
            text-align: center;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
        }

        .subtitle {
            font-family: var(--font-mono);
            color: #4a4e69;
            text-align: center;
            font-size: 0.8rem;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #000000;
            border: 1px solid #161922;
            border-radius: 16px;
            padding: 18px;
            color: #fff;
            font-size: 1.25rem;
            resize: none;
            box-sizing: border-box;
            font-family: var(--font-mono);
        }

        textarea:focus {
            outline: none;
            border-color: var(--neon-green);
        }

        .action-container {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }

        button {
            flex: 1;
            padding: 15px;
            background: #0e1017;
            border: 1px solid #1e2230;
            border-radius: 14px;
            color: #fff;
            font-family: var(--font-main);
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button.btn-encrypt {
            border-color: var(--neon-green);
            color: var(--neon-green);
        }

        button.btn-encrypt:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.3);
        }

        button.btn-decrypt:hover {
            background: #fff;
            color: #000;
        }

        .result-display {
            width: 100%;
            min-height: 85px;
            background: #000000;
            border: 1px solid #161922;
            border-radius: 16px;
            padding: 20px;
            color: var(--neon-green);
            font-size: 1.4rem;
            word-wrap: break-word;
            box-sizing: border-box;
            text-align: center;
            font-family: var(--font-mono);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>💀 GHOST_ENGINE</h1>
    <div class="subtitle">تشفير متصل بالأرقام التمويهية // نظام زمني ذكي V11.0</div>
    
    <textarea id="inputField" placeholder="اكتب كلامك هنا أو الصق الأرقام المتصلة لفكها..."></textarea>
    
    <div class="action-container">
        <button class="btn-encrypt" onclick="encryptGhost()">🔒 تشفير متصل ومموّه</button>
        <button class="btn-decrypt" onclick="decryptGhost()">🔓 فك الشفرة الذكي</button>
    </div>
    
    <div class="result-display" id="outputDisplay">// في انتظار النبضة السرية...</div>
</div>

<script>
const alphabet = [
    'أ', 'ا', 'ب', 'ت', 'ث', 'ج', 'ح', 'خ', 'د', 'ذ', 'ر', 'ز', 'س', 'ش', 'ص', 'ض', 
    'ط', 'ظ', 'ع', 'غ', 'ف', 'ق', 'ك', 'ل', 'م', 'ن', 'ه', 'هـ', 'و', 'ي', 'ى', 'ة', 'ء'
];

// توليد الخريطة بناءً على الدقيقة
function getMapForMinute(min) {
    let charToNum = {};
    let numToChar = {};
    let shifted = [...alphabet];
    let shift = min % alphabet.length;
    for(let i=0; i<shift; i++) shifted.push(shifted.shift());

    shifted.forEach((char, index) => {
        // نضمن دائماً خانتين (01, 02... 33) عشان الأرقام تلصق ببعض بدون ما تضيع
        let code = (index + 1).toString().padStart(2, '0');
        charToNum[char] = code;
        numToChar[code] = char;
    });

    charToNum['هـ'] = charToNum['ه'];
    charToNum['ى'] = charToNum['ي'];
    charToNum['أ'] = charToNum['ا'];
    charToNum[' '] = '00'; // المسافة بين الكلمات هي 00

    return { charToNum, numToChar };
}

function encryptGhost() {
    let input = document.getElementById("inputField").value.trim();
    let output = document.getElementById("outputDisplay");
    if (!input) return;

    let currentMin = new Date().getMinutes();
    let { charToNum } = getMapForMinute(currentMin);
    
    // تحديد رقم تضييع ثابت لهذه الدقيقة (مثلاً رقم بين 4 و 8)
    let fakeNum = ((currentMin % 5) + 4).toString();

    let resultString = "";
    for (let char of input) {
        if (charToNum[char]) {
            // نضع الحرف الأصلي المكون من خانتين وبعده رقم التمويه المشتت
            resultString += charToNum[char] + fakeNum;
        }
    }
    
    // ندمج رقم الدقيقة في نهاية النص كبصمة خفية للسيستم
    output.innerText = resultString + currentMin.toString().padStart(2, '0');
}

function decryptGhost() {
    let input = document.getElementById("inputField").value.trim().replace(/\s+/g, '');
    let output = document.getElementById("outputDisplay");
    if (!input) return;

    // استخراج الدقيقة المدمجة بآخر خانتين
    let embeddedMin = parseInt(input.slice(-2));
    let mainCipher = input.slice(0, -2);

    // نجرب الدقيقة المدمجة أولاً، وإذا لم تنجح نجرب نطاق آخر 60 دقيقة مضت (لفك أي شفرة قديمة!)
    for (let offset = 0; offset < 60; offset++) {
        let targetMin = (embeddedMin - offset + 60) % 60;
        let { numToChar } = getMapForMinute(targetMin);
        let fakeNum = ((targetMin % 5) + 4).toString();
        
        let decryptedText = "";
        let success = true;

        // نقرأ النص ككتل: كل كتلة مكونة من 3 خانات (خانين للحرف + خانة للتمويه)
        for (let i = 0; i < mainCipher.length; i += 3) {
            let charCode = mainCipher.substring(i, i + 2);
            let extractedFake = mainCipher.substring(i + 2, i + 3);

            if (extractedFake !== fakeNum || !numToChar[charCode]) {
                success = false;
                break;
            }
            decryptedText += numToChar[charCode] === '00' ? ' ' : numToChar[charCode];
        }

        if (success) {
            output.innerText = decryptedText;
            return;
        }
    }

    output.innerText = "// خطأ: تعذر فك التشفير، الشفرة غير متطابقة!";
}
</script>

</body>
</html>
